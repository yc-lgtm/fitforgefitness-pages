<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitForgeFitness</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0a0a;
        --surface: #141414;
        --border: #222222;
        --text: #f0f0f0;
        --muted: #9a9a9a;
        --accent: #4db6ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(77, 182, 255, 0.12), transparent 30%),
          var(--bg);
        color: var(--text);
        line-height: 1.6;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 56px 20px 80px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 24px;
      }

      .links {
        display: grid;
        gap: 14px;
        margin-top: 22px;
      }

      a {
        display: block;
        padding: 16px 18px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
        color: var(--text);
        text-decoration: none;
        transition: border-color 150ms ease, transform 150ms ease;
      }

      a:hover {
        border-color: var(--accent);
        transform: translateY(-1px);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 2.4rem;
      }

      p {
        color: var(--muted);
        margin: 0;
      }

      .tag {
        display: inline-block;
        margin-bottom: 18px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(77, 182, 255, 0.28);
        background: rgba(77, 182, 255, 0.08);
        color: var(--accent);
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <div class="tag">FitForgeFitness</div>
        <h1>Support and Privacy</h1>
        <p>
          Official public links for FitForgeFitness support and privacy
          information.
        </p>
        <div class="links">
          <a href="./support.html">Support</a>
          <a href="./privacy.html">Privacy Policy</a>
        </div>
      </div>
    </main>
  </body>
</html>
